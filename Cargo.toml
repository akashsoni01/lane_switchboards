[package]
name = "lane_switchboards"
version = "0.1.0"
edition = "2021"
description = "OTP-style actor runtime: actors, supervision, linking, monitoring, distributed messaging, hot upgrade"
license = "MIT"
readme = "README.md"

[dependencies]
tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros", "net", "io-util", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashmap = "6"
once_cell = "1"
async-trait = "0.1"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
ractor = { version = "0.14", features = ["async-trait"] }
ractor-supervisor = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
actix-web = "4"
actix-test = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
url = "2"
anyhow = "1"
futures-util = "0.3"
tokio-test = "0.4"
hmac = "0.12"
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["std"] }
blake2 = "0.10"
base64 = "0.22"

[[example]]
name = "gateway"
path = "examples/gateway/main.rs"

[[example]]
name = "hot_upgrade"
path = "examples/hot_upgrade.rs"

[[example]]
name = "distributed_demo"
path = "examples/distributed_demo.rs"

[[example]]
name = "envelope_demo"
path = "examples/envelope_demo.rs"

[[example]]
name = "ondc_demo"
path = "examples/ondc_demo.rs"
