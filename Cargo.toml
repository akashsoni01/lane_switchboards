[package]
name = "lane_switchboards"
version = "0.1.0"
edition = "2021"
description = "Telecom-inspired OTP actor runtime for Rust: mailbox routing, supervision trees, let-it-crash fault isolation, and distributed messaging"
license = "MIT"
readme = "README.md"
keywords = ["actor", "otp", "supervision", "concurrency", "erlang"]
categories = ["asynchronous", "concurrency"]

[dependencies]
tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros", "net", "io-util", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashmap = "6"
once_cell = "1"
async-trait = "0.1"
tracing = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
ractor = { version = "0.14", features = ["async-trait"] }
ractor-supervisor = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
actix-web = "4"
actix-test = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
url = "2"
anyhow = "1"
futures-util = "0.3"
tokio-test = "0.4"
hmac = "0.12"
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["std"] }
blake2 = "0.10"
base64 = "0.22"

# --- Core runtime demos ---

[[example]]
name = "envelope_demo"
path = "examples/envelope_demo.rs"

[[example]]
name = "supervisor_strategies"
path = "examples/supervisor_strategies.rs"

[[example]]
name = "hot_upgrade"
path = "examples/hot_upgrade.rs"

[[example]]
name = "distributed_demo"
path = "examples/distributed_demo.rs"

[[example]]
name = "horizontal_scaling"
path = "examples/horizontal_scaling.rs"

# --- Calculator & supervision (switchboard routing + fault recovery) ---

[[example]]
name = "calculator"
path = "examples/calculator.rs"

[[example]]
name = "resilient_calculator"
path = "examples/resilient_calculator.rs"

[[example]]
name = "resilient_calculator_timer"
path = "examples/resilient_calculator_timer.rs"

[[example]]
name = "recoverable_timer_calc"
path = "examples/recoverable_timer_calc.rs"

[[example]]
name = "rest_for_one_calculator_timer"
path = "examples/rest_for_one_calculator_timer.rs"

# --- Additional examples (not listed in README) ---

[[example]]
name = "gateway"
path = "examples/gateway/main.rs"
